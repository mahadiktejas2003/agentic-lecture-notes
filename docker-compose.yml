version: '3.8'

# =============================================================================
# AGENTIC LECTURE NOTES - PRODUCTION DOCKER COMPOSE
# Optimized for Mac M4 Silicon (ARM64) | Free Forever Stack
# =============================================================================
# Services:
#   1. web-ui         : Next.js frontend (Port 3000)
#   2. pipeline-worker: Python LangGraph processor with FFmpeg/Tesseract
#   3. redis          : Job queue for real-time progress updates
#   4. mcp-generator  : FastMCP server for DOCX generation
#   5. mcp-audit      : FastMCP server for 15-Gate quality audit
#   6. mcp-extractor  : FastMCP server for video frame extraction
# =============================================================================

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # WEB UI SERVICE (Next.js 16 + Uppy + Socket.io)
  # ─────────────────────────────────────────────────────────────────────────────
  web-ui:
    build:
      context: ./web_ui
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Cloudflare R2 Configuration
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      # Supabase Configuration
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      # Redis for real-time updates
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./lecture-input:/app/lecture-input:ro
      - ./notes-output:/app/notes-output
    depends_on:
      - pipeline-worker
      - redis
    restart: unless-stopped
    networks:
      - lecture-net

  # ─────────────────────────────────────────────────────────────────────────────
  # PIPELINE WORKER (LangGraph Orchestrator + FFmpeg + Tesseract)
  # ─────────────────────────────────────────────────────────────────────────────
  pipeline-worker:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    environment:
      - PYTHONUNBUFFERED=1
      # Cloudflare R2 Configuration
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      # Supabase Configuration
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      # AI Model APIs (Optional - falls back to local if not set)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - CLOUDFLARE_AI_TOKEN=${CLOUDFLARE_AI_TOKEN:-}
      # MCP Server Authentication
      - MCP_API_KEY=lecture_notes_secure_mcp_key_2026
      # Redis Connection
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./lecture-input:/app/lecture-input
      - ./notes-output:/app/notes-output
      - ./agent_memory:/app/agent_memory
      - ./slides:/app/slides
      - processor-cache:/tmp/processing
    working_dir: /app
    command: ["python", "scripts/langgraph_orchestrator.py", "--watch"]
    depends_on:
      - mcp-generator
      - mcp-audit
      - mcp-extractor
      - redis
    restart: unless-stopped
    networks:
      - lecture-net

  # ─────────────────────────────────────────────────────────────────────────────
  # REDIS (Real-time Job Queue & Progress Tracking)
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - lecture-net

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP SERVERS (FastMCP Microservices)
  # ─────────────────────────────────────────────────────────────────────────────
  mcp-generator:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    command: ["python", "scripts/mcp_servers/generate_docx_server.py"]
    ports:
      - "8011:8011"
    environment:
      - MCP_API_KEY=lecture_notes_secure_mcp_key_2026
      - PYTHONUNBUFFERED=1
    volumes:
      - ./lecture-input:/app/lecture-input
      - ./notes-output:/app/notes-output
    restart: unless-stopped
    networks:
      - lecture-net

  mcp-audit:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    command: ["python", "scripts/mcp_servers/audit_server.py"]
    ports:
      - "8012:8012"
    environment:
      - MCP_API_KEY=lecture_notes_secure_mcp_key_2026
      - PYTHONUNBUFFERED=1
    volumes:
      - ./notes-output:/app/notes-output
    restart: unless-stopped
    networks:
      - lecture-net

  mcp-extractor:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    command: ["python", "scripts/mcp_servers/extract_frames_server.py"]
    ports:
      - "8013:8013"
    environment:
      - MCP_API_KEY=lecture_notes_secure_mcp_key_2026
      - PYTHONUNBUFFERED=1
    volumes:
      - ./lecture-input:/app/lecture-input
      - ./frames-cache:/app/frames-cache
    restart: unless-stopped
    networks:
      - lecture-net

# ─────────────────────────────────────────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  processor-cache:
    driver: local
  redis-data:
    driver: local
  frames-cache:
    driver: local

networks:
  lecture-net:
    driver: bridge
